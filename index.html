<!DOCTYPE html>
<html lang="en">
<head>
<title>VT Interactive Butterfly AR</title>
 <!-- Import A-Frame Library -->
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<!-- Import AR.js Library -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<!-- Import Hammer.js Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js" integrity="sha512-UXumZrZNiOwnTcZSHLOfcTs0aos2MzBWHXOHOuB0J/R44QB0dwY5JgfbvljXcklVf65Gc4El6RjZ+lnwd2az2g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
        //add javascript code within script tag for hammertime
    //defines hammertime for AFrame copy and pasted, changed to a-entity
AFRAME.registerComponent("foo", {
  init: function () {
    const sceneEl = this.el.sceneEl;
    const model = this.el;

    const hammertime = new Hammer(sceneEl.canvas);

    // Enable pinch
    hammertime.get('pinch').set({ enable: true });

    let currentScale = model.getAttribute("scale");

    // Rotation (pan)
    hammertime.on('pan', (ev) => {
      let rotation = model.getAttribute("rotation");

      rotation.y += ev.deltaX * 0.1;
      rotation.x += ev.deltaY * 0.1;

      model.setAttribute("rotation", rotation);
    });

    // Scaling (pinch)
    hammertime.on("pinch", (ev) => {
      let newScale = {
        x: currentScale.x * ev.scale,
        y: currentScale.y * ev.scale,
        z: currentScale.z * ev.scale
      };

      model.setAttribute("scale", newScale);
    });

    hammertime.on("pinchend", () => {
      currentScale = model.getAttribute("scale");
    });
  }
});
    
    
</script>
    
</head>
<body style='margin : 0px; overflow: hidden;'>
  <a-scene embedded arjs>
      <!-- define a marker for the model to track -->
     <a-marker type='pattern' url='swallowtail2.patt'>
           <!-- use your gltf model -->
      <a-entity gltf-model="tiger_swallowtailFin.glb" 
                position = "0 0 0"
                scale = "0.3 0.3 0.3" 
                foo></a-entity>
      </a-marker>
      
<!-- Optional: Add more trackers and models -->
       <a-marker type='pattern' url='monarch2_test.patt'>
           <!-- use your gltf model -->
      <a-entity gltf-model="monarch_Fin.glb" 
                position = "0 0 0" 
                scale = "0.5 0.5 0.5" 
                foo></a-entity>
      </a-marker>
      
      <!-- define a camera which will move according to the marker position -->
      <a-entity camera></a-entity>
  
  </a-scene>
</body>
</html>
