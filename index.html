<!DOCTYPE html>
<html lang="en">
<head>
<title>VT Interactive Butterfly AR</title>
 <!-- Import A-Frame Library -->
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<!-- Import AR.js Library -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<!-- Import Hammer.js Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js" integrity="sha512-UXumZrZNiOwnTcZSHLOfcTs0aos2MzBWHXOHOuB0J/R44QB0dwY5JgfbvljXcklVf65Gc4El6RjZ+lnwd2az2g==" crossorigin="anonymous" referrerpolicy="no-referrer">
    //add javascript code within script tag for hammertime
    //defines hammertime for AFrame copy and pasted, changed to a-entity
    AFRAME.registerComponent("foo",{ init:function() 
    { var element = document.querySelector('body'); this.marker = document.querySelector('a-marker') 
     var model = document.querySelector('a-entity'); 
     var hammertime = new Hammer(element); 
     var pinch = new Hammer.Pinch(); 
     // Pinch is not by default in the recognisers hammertime.add(pinch); 
     // // add it to the Manager instance
    
     //code from Stack Overflow
      hammertime.on('pan', (ev) => {
     let rotation = model.getAttribute("rotation")
     switch(ev.direction) {
       case 2:
         rotation.y = rotation.y + 4
         break;
       case 4:
         rotation.y = rotation.y - 4
         break;
       case 8:
         rotation.x = rotation.x + 4
         break;
       case 16:
         rotation.x = rotation.x - 4
         break;
       default:
         break;
     }
     model.setAttribute("rotation", rotation)
   });

  hammertime.on("pinch", (ev) => {
     let scale = {x:ev.scale, y:ev.scale, z:ev.scale}
     model.setAttribute("scale", scale);
 });
    
    
</script>
    
</head>
<body style='margin : 0px; overflow: hidden;'>
  <a-scene embedded arjs>
      <!-- define a marker for the model to track -->
     <a-marker type='pattern' url='swallowtail2.patt'>
           <!-- use your gltf model -->
      <a-entity gltf-model="tiger_swallowtailFin.glb" position = "0 0 0" scale = "0.3 0.3 0.3"></a-entity>
      </a-marker>
      
<!-- Optional: Add more trackers and models -->
       <a-marker type='pattern' url='monarch2_test.patt'>
           <!-- use your gltf model -->
      <a-entity gltf-model="monarch_Fin.glb" position = "0 0 0" scale = "0.5 0.5 0.5"></a-entity>
      </a-marker>
      
      <!-- define a camera which will move according to the marker position -->
      <a-entity camera></a-entity>
  
  </a-scene>
</body>
</html>
